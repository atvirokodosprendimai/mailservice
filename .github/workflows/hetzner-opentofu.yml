name: Hetzner OpenTofu

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/hetzner-opentofu.yml"
      - "infra/opentofu/**"
      - "nix/modules/mailservice-gitops.nix"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/hetzner-opentofu.yml"
      - "infra/opentofu/**"
      - "nix/modules/mailservice-gitops.nix"
  workflow_dispatch:
    inputs:
      apply:
        description: "Apply infrastructure changes"
        required: true
        default: "false"
      environment:
        description: "Deployment environment name"
        required: true
        default: "production"
      image:
        description: "Hetzner server image or snapshot id"
        required: true
        default: "ubuntu-24.04"
      name:
        description: "Deployment name prefix"
        required: true
        default: "mailservice"
      bootstrap_mode:
        description: "Host bootstrap mode"
        required: true
        default: "ubuntu-docker"
      public_hostname:
        description: "Public DNS hostname (e.g. smoke.truevipaccess.com)"
        required: false
        default: ""
      cloudflare_zone_name:
        description: "Cloudflare zone name (if different from public hostname)"
        required: false
        default: ""
      create_domain_a_record:
        description: "Create A record for the public hostname"
        required: false
        default: "false"

concurrency:
  group: infra-${{ github.event.inputs.environment || 'production' }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/opentofu
        shell: bash -euo pipefail {0}
    permissions:
      contents: read

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@9d84900f3238fab8cd84ce47d658d25dd008be2f # v1.0.8
        with:
          tofu_wrapper: false

      - name: OpenTofu fmt
        run: tofu fmt -check

      - name: OpenTofu init (no backend)
        run: |
          for attempt in 1 2 3; do
            if tofu init -backend=false; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            sleep 5
          done

      - name: OpenTofu validate
        env:
          TF_VAR_hcloud_token: "placeholder"
          TF_VAR_cloudflare_api_token: "placeholder"
          TF_VAR_ssh_key_fingerprint: "00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00"
          TF_VAR_public_base_url: "https://example.invalid"
          TF_VAR_image: "ubuntu-24.04"
          TF_VAR_name: "mailservice"
          TF_VAR_bootstrap_mode: "ubuntu-docker"
        run: tofu validate

  plan:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: validate
    environment:
      name: ${{ github.event.inputs.environment }}
    defaults:
      run:
        working-directory: infra/opentofu
        shell: bash -euo pipefail {0}
    permissions:
      contents: read

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@9d84900f3238fab8cd84ce47d658d25dd008be2f # v1.0.8
        with:
          tofu_wrapper: false

      - name: Write backend config
        run: |
          cat > backend.hcl <<EOF
          bucket = "${TOFU_STATE_BUCKET}"
          key    = "mailservice/${DEPLOY_ENV}/terraform.tfstate"
          region = "${TOFU_STATE_REGION}"
          endpoints = {
            s3 = "${TOFU_STATE_ENDPOINT}"
          }
          access_key = "${TOFU_STATE_ACCESS_KEY}"
          secret_key = "${TOFU_STATE_SECRET_KEY}"
          skip_credentials_validation = true
          skip_requesting_account_id  = true
          skip_metadata_api_check     = true
          use_path_style              = true
          EOF
        env:
          DEPLOY_ENV: ${{ github.event.inputs.environment }}
          TOFU_STATE_BUCKET: ${{ secrets.TOFU_STATE_BUCKET }}
          TOFU_STATE_REGION: ${{ secrets.TOFU_STATE_REGION }}
          TOFU_STATE_ENDPOINT: ${{ secrets.TOFU_STATE_ENDPOINT }}
          TOFU_STATE_ACCESS_KEY: ${{ secrets.TOFU_STATE_ACCESS_KEY }}
          TOFU_STATE_SECRET_KEY: ${{ secrets.TOFU_STATE_SECRET_KEY }}

      - name: OpenTofu init
        run: |
          for attempt in 1 2 3; do
            if tofu init -backend-config=backend.hcl; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            sleep 5
          done

      - name: OpenTofu plan
        env:
          TF_VAR_hcloud_token: ${{ secrets.HCLOUD_API }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_name: ${{ github.event.inputs.name }}
          TF_VAR_ssh_key_fingerprint: ${{ secrets.HETZNER_SSH_KEY_FINGERPRINT }}
          TF_VAR_public_base_url: ${{ vars.PUBLIC_BASE_URL }}
          TF_VAR_image: ${{ github.event.inputs.image }}
          TF_VAR_bootstrap_mode: ${{ github.event.inputs.bootstrap_mode }}
          TF_VAR_public_hostname: ${{ github.event.inputs.public_hostname }}
          TF_VAR_cloudflare_zone_name: ${{ github.event.inputs.cloudflare_zone_name }}
          TF_VAR_create_domain_a_record: ${{ github.event.inputs.create_domain_a_record }}
        run: tofu plan -input=false -out=tfplan

      - name: Render plan summary
        run: tofu show -no-color tfplan > tfplan.txt

      - name: Upload plan artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: opentofu-plan-${{ github.run_id }}
          path: |
            infra/opentofu/tfplan
            infra/opentofu/tfplan.txt
          retention-days: 7

  apply:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.apply == 'true'
    runs-on: ubuntu-latest
    needs: plan
    environment:
      name: ${{ github.event.inputs.environment }}
    defaults:
      run:
        working-directory: infra/opentofu
        shell: bash -euo pipefail {0}
    permissions:
      contents: read

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@9d84900f3238fab8cd84ce47d658d25dd008be2f # v1.0.8
        with:
          tofu_wrapper: false

      - name: Download plan artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: opentofu-plan-${{ github.run_id }}
          path: infra/opentofu

      - name: Write backend config
        run: |
          cat > backend.hcl <<EOF
          bucket = "${TOFU_STATE_BUCKET}"
          key    = "mailservice/${DEPLOY_ENV}/terraform.tfstate"
          region = "${TOFU_STATE_REGION}"
          endpoints = {
            s3 = "${TOFU_STATE_ENDPOINT}"
          }
          access_key = "${TOFU_STATE_ACCESS_KEY}"
          secret_key = "${TOFU_STATE_SECRET_KEY}"
          skip_credentials_validation = true
          skip_requesting_account_id  = true
          skip_metadata_api_check     = true
          use_path_style              = true
          EOF
        env:
          DEPLOY_ENV: ${{ github.event.inputs.environment }}
          TOFU_STATE_BUCKET: ${{ secrets.TOFU_STATE_BUCKET }}
          TOFU_STATE_REGION: ${{ secrets.TOFU_STATE_REGION }}
          TOFU_STATE_ENDPOINT: ${{ secrets.TOFU_STATE_ENDPOINT }}
          TOFU_STATE_ACCESS_KEY: ${{ secrets.TOFU_STATE_ACCESS_KEY }}
          TOFU_STATE_SECRET_KEY: ${{ secrets.TOFU_STATE_SECRET_KEY }}

      - name: OpenTofu init
        run: |
          for attempt in 1 2 3; do
            if tofu init -backend-config=backend.hcl; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            sleep 5
          done

      - name: OpenTofu apply
        env:
          TF_VAR_hcloud_token: ${{ secrets.HCLOUD_API }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_name: ${{ github.event.inputs.name }}
          TF_VAR_ssh_key_fingerprint: ${{ secrets.HETZNER_SSH_KEY_FINGERPRINT }}
          TF_VAR_public_base_url: ${{ vars.PUBLIC_BASE_URL }}
          TF_VAR_image: ${{ github.event.inputs.image }}
          TF_VAR_bootstrap_mode: ${{ github.event.inputs.bootstrap_mode }}
          TF_VAR_public_hostname: ${{ github.event.inputs.public_hostname }}
          TF_VAR_cloudflare_zone_name: ${{ github.event.inputs.cloudflare_zone_name }}
          TF_VAR_create_domain_a_record: ${{ github.event.inputs.create_domain_a_record }}
        run: tofu apply -input=false -auto-approve tfplan

  auto-apply:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: validate
    environment:
      name: production
    defaults:
      run:
        working-directory: infra/opentofu
        shell: bash -euo pipefail {0}
    permissions:
      contents: read

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@9d84900f3238fab8cd84ce47d658d25dd008be2f # v1.0.8
        with:
          tofu_wrapper: false

      - name: Write backend config
        run: |
          cat > backend.hcl <<EOF
          bucket = "${TOFU_STATE_BUCKET}"
          key    = "mailservice/production/terraform.tfstate"
          region = "${TOFU_STATE_REGION}"
          endpoints = {
            s3 = "${TOFU_STATE_ENDPOINT}"
          }
          access_key = "${TOFU_STATE_ACCESS_KEY}"
          secret_key = "${TOFU_STATE_SECRET_KEY}"
          skip_credentials_validation = true
          skip_requesting_account_id  = true
          skip_metadata_api_check     = true
          use_path_style              = true
          EOF
        env:
          TOFU_STATE_BUCKET: ${{ secrets.TOFU_STATE_BUCKET }}
          TOFU_STATE_REGION: ${{ secrets.TOFU_STATE_REGION }}
          TOFU_STATE_ENDPOINT: ${{ secrets.TOFU_STATE_ENDPOINT }}
          TOFU_STATE_ACCESS_KEY: ${{ secrets.TOFU_STATE_ACCESS_KEY }}
          TOFU_STATE_SECRET_KEY: ${{ secrets.TOFU_STATE_SECRET_KEY }}

      - name: OpenTofu init
        run: |
          for attempt in 1 2 3; do
            if tofu init -backend-config=backend.hcl; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            sleep 5
          done

      - name: OpenTofu apply
        env:
          TF_VAR_hcloud_token: ${{ secrets.HCLOUD_API }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_name: ${{ vars.TOFU_SERVER_NAME }}
          TF_VAR_ssh_key_fingerprint: ${{ secrets.HETZNER_SSH_KEY_FINGERPRINT }}
          TF_VAR_public_base_url: ${{ vars.PUBLIC_BASE_URL }}
          TF_VAR_image: ${{ vars.TOFU_SERVER_IMAGE }}
          TF_VAR_bootstrap_mode: "none"
        run: tofu apply -input=false -auto-approve
