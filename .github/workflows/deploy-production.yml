name: Deploy Production App

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Detect Cachix configuration
        id: cachix
        env:
          CACHIX_CACHE_NAME: ${{ vars.CACHIX_CACHE_NAME }}
          CACHIX_PUBLIC_KEY: ${{ vars.CACHIX_PUBLIC_KEY }}
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        run: |
          if [ -n "$CACHIX_CACHE_NAME" ] && [ -n "$CACHIX_PUBLIC_KEY" ] && [ -n "$CACHIX_AUTH_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure Cachix
        if: ${{ steps.cachix.outputs.enabled == 'true' }}
        uses: cachix/cachix-action@v15
        with:
          name: ${{ vars.CACHIX_CACHE_NAME }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build production system closure
        run: |
          nix build .#nixosConfigurations.truevipaccess.config.system.build.toplevel

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

      - name: Trust deploy host
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "${DEPLOY_HOST_KEY}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
        env:
          DEPLOY_HOST_KEY: ${{ secrets.DEPLOY_HOST_KEY }}

      - name: Upload repo to host
        run: |
          ssh -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts "${DEPLOY_USER}@${DEPLOY_HOST}" 'install -d -m 700 /root/mailservice'
          rsync -az --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'result' \
            --exclude '.direnv' \
            -e 'ssh -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts' \
            ./ "${DEPLOY_USER}@${DEPLOY_HOST}:/root/mailservice/"
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}

      - name: Apply NixOS configuration
        run: |
          ssh -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts "${DEPLOY_USER}@${DEPLOY_HOST}" "
            set -eu
            cd /root/mailservice
            rebuild_cmd="nixos-rebuild switch --flake .#truevipaccess"

            if [ -n \"${CACHIX_CACHE_NAME}\" ] && [ -n \"${CACHIX_PUBLIC_KEY}\" ]; then
              rebuild_cmd=\"\$rebuild_cmd --option extra-substituters https://${CACHIX_CACHE_NAME}.cachix.org --option extra-trusted-public-keys ${CACHIX_CACHE_NAME}.cachix.org-1:${CACHIX_PUBLIC_KEY}\"
            fi

            eval \"\$rebuild_cmd\"
          "
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          CACHIX_CACHE_NAME: ${{ vars.CACHIX_CACHE_NAME }}
          CACHIX_PUBLIC_KEY: ${{ vars.CACHIX_PUBLIC_KEY }}

      - name: Health check
        run: |
          ssh -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts "${DEPLOY_USER}@${DEPLOY_HOST}" '
            curl --fail --silent --show-error \
              --retry 10 --retry-delay 3 --retry-connrefused \
              http://127.0.0.1:8080/healthz
          '
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
