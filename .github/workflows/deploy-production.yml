name: Deploy Production App

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  build:
    outputs:
      s3_cache_enabled: ${{ steps.s3cache.outputs.enabled }}
      s3_cache_upload_enabled: ${{ steps.s3cache.outputs.upload_enabled }}
      s3_cache_bucket: ${{ steps.s3cache.outputs.bucket }}
      s3_cache_endpoint: ${{ steps.s3cache.outputs.endpoint }}
      s3_cache_region: ${{ steps.s3cache.outputs.region }}
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v1

      - name: Detect S3 cache configuration
        id: s3cache
        env:
          NIX_CACHE_S3_BUCKET: ${{ vars.NIX_CACHE_S3_BUCKET }}
          NIX_CACHE_S3_ENDPOINT: ${{ vars.NIX_CACHE_S3_ENDPOINT }}
          NIX_CACHE_S3_REGION: ${{ vars.NIX_CACHE_S3_REGION }}
          NIX_CACHE_S3_ACCESS_KEY_ID: ${{ secrets.NIX_CACHE_S3_ACCESS_KEY_ID }}
          NIX_CACHE_S3_SECRET_ACCESS_KEY: ${{ secrets.NIX_CACHE_S3_SECRET_ACCESS_KEY }}
          TOFU_STATE_BUCKET: ${{ secrets.TOFU_STATE_BUCKET }}
          TOFU_STATE_ENDPOINT: ${{ secrets.TOFU_STATE_ENDPOINT }}
          TOFU_STATE_REGION: ${{ secrets.TOFU_STATE_REGION }}
          TOFU_STATE_ACCESS_KEY: ${{ secrets.TOFU_STATE_ACCESS_KEY }}
          TOFU_STATE_SECRET_KEY: ${{ secrets.TOFU_STATE_SECRET_KEY }}
        run: |
          set -eu

          bucket="${NIX_CACHE_S3_BUCKET:-}"
          endpoint="${NIX_CACHE_S3_ENDPOINT:-}"
          region="${NIX_CACHE_S3_REGION:-}"

          if [ -z "$bucket" ] && [ -n "${TOFU_STATE_BUCKET:-}" ]; then
            bucket="${TOFU_STATE_BUCKET}-nix-cache"
          fi

          if [ -z "$endpoint" ] && [ -n "${TOFU_STATE_ENDPOINT:-}" ]; then
            endpoint="$TOFU_STATE_ENDPOINT"
          fi

          if [ -z "$region" ] && [ -n "${TOFU_STATE_REGION:-}" ]; then
            region="$TOFU_STATE_REGION"
          fi

          endpoint="${endpoint#http://}"
          endpoint="${endpoint#https://}"

          if [ -z "$region" ] && [ -n "$endpoint" ]; then
            region="${endpoint%%.*}"
          fi
          if [ "$region" = "eu-central-1" ] || [ "$region" = "eu-central" ]; then
            region="${endpoint%%.*}"
          fi

          if [ -n "$bucket" ] && [ -n "$endpoint" ] && [ -n "$region" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

          access_key="${NIX_CACHE_S3_ACCESS_KEY_ID:-${TOFU_STATE_ACCESS_KEY:-}}"
          secret_key="${NIX_CACHE_S3_SECRET_ACCESS_KEY:-${TOFU_STATE_SECRET_KEY:-}}"
          if [ -n "$bucket" ] && [ -n "$endpoint" ] && [ -n "$region" ] && [ -n "$access_key" ] && [ -n "$secret_key" ]; then
            echo "upload_enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "upload_enabled=false" >> "$GITHUB_OUTPUT"
          fi

          echo "bucket=$bucket" >> "$GITHUB_OUTPUT"
          echo "endpoint=$endpoint" >> "$GITHUB_OUTPUT"
          echo "region=$region" >> "$GITHUB_OUTPUT"

      - name: Build production system closure
        env:
          S3_CACHE_ENABLED: ${{ steps.s3cache.outputs.enabled }}
          NIX_CACHE_S3_BUCKET: ${{ steps.s3cache.outputs.bucket }}
          NIX_CACHE_S3_ENDPOINT: ${{ steps.s3cache.outputs.endpoint }}
          NIX_CACHE_S3_REGION: ${{ steps.s3cache.outputs.region }}
          AWS_ACCESS_KEY_ID: ${{ secrets.NIX_CACHE_S3_ACCESS_KEY_ID != '' && secrets.NIX_CACHE_S3_ACCESS_KEY_ID || secrets.TOFU_STATE_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.NIX_CACHE_S3_SECRET_ACCESS_KEY != '' && secrets.NIX_CACHE_S3_SECRET_ACCESS_KEY || secrets.TOFU_STATE_SECRET_KEY }}
        run: |
          if [ "$S3_CACHE_ENABLED" = "true" ]; then
            nix build .#nixosConfigurations.truevipaccess.config.system.build.toplevel \
              --option extra-substituters "s3://${NIX_CACHE_S3_BUCKET}?endpoint=${NIX_CACHE_S3_ENDPOINT}&region=${NIX_CACHE_S3_REGION}"
          else
            nix build .#nixosConfigurations.truevipaccess.config.system.build.toplevel
          fi

      - name: Ensure Nix cache metadata exists
        if: ${{ steps.s3cache.outputs.upload_enabled == 'true' }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.NIX_CACHE_S3_ACCESS_KEY_ID != '' && secrets.NIX_CACHE_S3_ACCESS_KEY_ID || secrets.TOFU_STATE_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.NIX_CACHE_S3_SECRET_ACCESS_KEY != '' && secrets.NIX_CACHE_S3_SECRET_ACCESS_KEY || secrets.TOFU_STATE_SECRET_KEY }}
          NIX_CACHE_S3_BUCKET: ${{ steps.s3cache.outputs.bucket }}
          NIX_CACHE_S3_ENDPOINT: ${{ steps.s3cache.outputs.endpoint }}
          NIX_CACHE_S3_REGION: ${{ steps.s3cache.outputs.region }}
        run: |
          endpoint_url="https://${NIX_CACHE_S3_ENDPOINT}"
          if aws s3api head-object --bucket "$NIX_CACHE_S3_BUCKET" --key nix-cache-info --region "$NIX_CACHE_S3_REGION" --endpoint-url "$endpoint_url" >/dev/null 2>&1; then
            exit 0
          fi
          printf 'StoreDir: /nix/store\nWantMassQuery: 1\nPriority: 40\n' > nix-cache-info
          aws s3 cp nix-cache-info "s3://${NIX_CACHE_S3_BUCKET}/nix-cache-info" --region "$NIX_CACHE_S3_REGION" --endpoint-url "$endpoint_url"

      - name: Upload closure to Hetzner S3 cache
        if: ${{ steps.s3cache.outputs.upload_enabled == 'true' }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.NIX_CACHE_S3_ACCESS_KEY_ID != '' && secrets.NIX_CACHE_S3_ACCESS_KEY_ID || secrets.TOFU_STATE_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.NIX_CACHE_S3_SECRET_ACCESS_KEY != '' && secrets.NIX_CACHE_S3_SECRET_ACCESS_KEY || secrets.TOFU_STATE_SECRET_KEY }}
          NIX_CACHE_S3_BUCKET: ${{ steps.s3cache.outputs.bucket }}
          NIX_CACHE_S3_ENDPOINT: ${{ steps.s3cache.outputs.endpoint }}
          NIX_CACHE_S3_REGION: ${{ steps.s3cache.outputs.region }}
        run: |
          closure_path="$(nix path-info .#nixosConfigurations.truevipaccess.config.system.build.toplevel)"
          nix copy --to "s3://${NIX_CACHE_S3_BUCKET}?endpoint=${NIX_CACHE_S3_ENDPOINT}&region=${NIX_CACHE_S3_REGION}" "$closure_path"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute build metadata
        run: |
          short_sha="${GITHUB_SHA:0:7}"
          echo "BUILD_NUMBER=${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"
          echo "CACHE_BUSTER=${short_sha}-${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_ENV"

      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

      - name: Trust deploy host
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "${DEPLOY_HOST_KEY}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
        env:
          DEPLOY_HOST_KEY: ${{ secrets.DEPLOY_HOST_KEY }}

      - name: Upload repo to host
        run: |
          ssh -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts "${DEPLOY_USER}@${DEPLOY_HOST}" 'install -d -m 700 /root/mailservice'
          rsync -az --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'result' \
            --exclude '.direnv' \
            -e 'ssh -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts' \
            ./ "${DEPLOY_USER}@${DEPLOY_HOST}:/root/mailservice/"
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}

      - name: Write build metadata on host
        run: |
          ssh -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts "${DEPLOY_USER}@${DEPLOY_HOST}" "BUILD_NUMBER='${BUILD_NUMBER}' CACHE_BUSTER='${CACHE_BUSTER}' bash -se" <<'EOF'
            set -eu
            env_file="/var/lib/secrets/mailservice.env"
            tmp_file="$(mktemp)"
            if [ -f "$env_file" ]; then
              awk "!/^BUILD_NUMBER=|^CACHE_BUSTER=/" "$env_file" > "$tmp_file"
            fi
            printf "BUILD_NUMBER=%s\n" "$BUILD_NUMBER" >> "$tmp_file"
            printf "CACHE_BUSTER=%s\n" "$CACHE_BUSTER" >> "$tmp_file"
            install -m 640 -o root -g mailservice "$tmp_file" "$env_file"
            rm -f "$tmp_file"
          EOF
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          BUILD_NUMBER: ${{ env.BUILD_NUMBER }}
          CACHE_BUSTER: ${{ env.CACHE_BUSTER }}

      - name: Apply NixOS configuration
        run: |
          ssh -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts "${DEPLOY_USER}@${DEPLOY_HOST}" "
            set -eu
            cd /root/mailservice
            if [ -n \"${NIX_CACHE_S3_BUCKET}\" ] && [ -n \"${NIX_CACHE_S3_ENDPOINT}\" ] && [ -n \"${NIX_CACHE_S3_REGION}\" ]; then
              nixos-rebuild switch --flake .#truevipaccess \
                --option extra-substituters \"s3://${NIX_CACHE_S3_BUCKET}?endpoint=${NIX_CACHE_S3_ENDPOINT}&region=${NIX_CACHE_S3_REGION}\"
            else
              nixos-rebuild switch --flake .#truevipaccess
            fi
          "
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          NIX_CACHE_S3_BUCKET: ${{ needs.build.outputs.s3_cache_bucket }}
          NIX_CACHE_S3_ENDPOINT: ${{ needs.build.outputs.s3_cache_endpoint }}
          NIX_CACHE_S3_REGION: ${{ needs.build.outputs.s3_cache_region }}

      - name: Health check
        run: |
          ssh -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts "${DEPLOY_USER}@${DEPLOY_HOST}" '
            curl --fail --silent --show-error \
              --retry 10 --retry-delay 3 --retry-connrefused \
              http://127.0.0.1:8080/healthz
          '
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}

      - name: Verify public build version
        env:
          PUBLIC_BASE_URL: ${{ vars.PUBLIC_BASE_URL }}
          BUILD_NUMBER: ${{ env.BUILD_NUMBER }}
          CACHE_BUSTER: ${{ env.CACHE_BUSTER }}
        run: |
          page="$(curl --fail --silent --show-error --location --retry 5 --retry-delay 5 --retry-connrefused "${PUBLIC_BASE_URL}/?cb=${CACHE_BUSTER}")"
          expected_build="Build: <code>${BUILD_NUMBER}</code>"
          expected_buster="Cache buster: <code>${CACHE_BUSTER}</code>"

          if [[ "$page" != *"$expected_build"* ]]; then
            echo "expected public page to contain: $expected_build" >&2
            exit 1
          fi

          if [[ "$page" != *"$expected_buster"* ]]; then
            echo "expected public page to contain: $expected_buster" >&2
            exit 1
          fi
