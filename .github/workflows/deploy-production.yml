name: Deploy Production App

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  build:
    outputs:
      s3_cache_enabled: ${{ steps.s3cache.outputs.enabled }}
      s3_cache_upload_enabled: ${{ steps.s3cache.outputs.upload_enabled }}
      s3_cache_bucket: ${{ steps.s3cache.outputs.bucket }}
      s3_cache_endpoint: ${{ steps.s3cache.outputs.endpoint }}
      s3_cache_region: ${{ steps.s3cache.outputs.region }}
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: read
    defaults:
      run:
        shell: bash -euo pipefail {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v1

      - name: Detect S3 cache configuration
        id: s3cache
        env:
          NIX_CACHE_S3_BUCKET: ${{ vars.NIX_CACHE_S3_BUCKET }}
          NIX_CACHE_S3_ENDPOINT: ${{ vars.NIX_CACHE_S3_ENDPOINT }}
          NIX_CACHE_S3_REGION: ${{ vars.NIX_CACHE_S3_REGION }}
          NIX_CACHE_S3_ACCESS_KEY_ID: ${{ secrets.NIX_CACHE_S3_ACCESS_KEY_ID }}
          NIX_CACHE_S3_SECRET_ACCESS_KEY: ${{ secrets.NIX_CACHE_S3_SECRET_ACCESS_KEY }}
          TOFU_STATE_BUCKET: ${{ secrets.TOFU_STATE_BUCKET }}
          TOFU_STATE_ENDPOINT: ${{ secrets.TOFU_STATE_ENDPOINT }}
          TOFU_STATE_REGION: ${{ secrets.TOFU_STATE_REGION }}
          TOFU_STATE_ACCESS_KEY: ${{ secrets.TOFU_STATE_ACCESS_KEY }}
          TOFU_STATE_SECRET_KEY: ${{ secrets.TOFU_STATE_SECRET_KEY }}
        run: |
          set -eu

          bucket="${NIX_CACHE_S3_BUCKET:-}"
          endpoint="${NIX_CACHE_S3_ENDPOINT:-}"
          region="${NIX_CACHE_S3_REGION:-}"

          if [ -z "$bucket" ] && [ -n "${TOFU_STATE_BUCKET:-}" ]; then
            bucket="${TOFU_STATE_BUCKET}-nix-cache"
          fi

          if [ -z "$endpoint" ] && [ -n "${TOFU_STATE_ENDPOINT:-}" ]; then
            endpoint="$TOFU_STATE_ENDPOINT"
          fi

          if [ -z "$region" ] && [ -n "${TOFU_STATE_REGION:-}" ]; then
            region="$TOFU_STATE_REGION"
          fi

          endpoint="${endpoint#http://}"
          endpoint="${endpoint#https://}"

          if [ -z "$region" ] && [ -n "$endpoint" ]; then
            region="${endpoint%%.*}"
          fi
          if [ "$region" = "eu-central-1" ] || [ "$region" = "eu-central" ]; then
            region="${endpoint%%.*}"
          fi

          if [ -n "$bucket" ] && [ -n "$endpoint" ] && [ -n "$region" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

          access_key="${NIX_CACHE_S3_ACCESS_KEY_ID:-}"
          secret_key="${NIX_CACHE_S3_SECRET_ACCESS_KEY:-}"
          if [ -n "$bucket" ] && [ -n "$endpoint" ] && [ -n "$region" ] && [ -n "$access_key" ] && [ -n "$secret_key" ]; then
            echo "upload_enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "upload_enabled=false" >> "$GITHUB_OUTPUT"
          fi

          echo "bucket=$bucket" >> "$GITHUB_OUTPUT"
          echo "endpoint=$endpoint" >> "$GITHUB_OUTPUT"
          echo "region=$region" >> "$GITHUB_OUTPUT"

      - name: Ensure Nix cache metadata exists
        if: ${{ steps.s3cache.outputs.upload_enabled == 'true' }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.NIX_CACHE_S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.NIX_CACHE_S3_SECRET_ACCESS_KEY }}
          NIX_CACHE_S3_BUCKET: ${{ steps.s3cache.outputs.bucket }}
          NIX_CACHE_S3_ENDPOINT: ${{ steps.s3cache.outputs.endpoint }}
          NIX_CACHE_S3_REGION: ${{ steps.s3cache.outputs.region }}
        run: |
          endpoint_url="https://${NIX_CACHE_S3_ENDPOINT}"
          if aws s3api head-object --bucket "$NIX_CACHE_S3_BUCKET" --key nix-cache-info --region "$NIX_CACHE_S3_REGION" --endpoint-url "$endpoint_url" >/dev/null 2>&1; then
            exit 0
          fi
          printf 'StoreDir: /nix/store\nWantMassQuery: 1\nPriority: 40\n' > nix-cache-info
          aws s3 cp nix-cache-info "s3://${NIX_CACHE_S3_BUCKET}/nix-cache-info" --region "$NIX_CACHE_S3_REGION" --endpoint-url "$endpoint_url"

      - name: Configure AWS profile for Nix daemon
        if: ${{ steps.s3cache.outputs.upload_enabled == 'true' }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.NIX_CACHE_S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.NIX_CACHE_S3_SECRET_ACCESS_KEY }}
          NIX_CACHE_S3_REGION: ${{ steps.s3cache.outputs.region }}
        run: |
          set -eu
          install -d -m 700 "$HOME/.aws"
          cat > "$HOME/.aws/credentials" <<EOF
          [cache-ci]
          aws_access_key_id = ${AWS_ACCESS_KEY_ID}
          aws_secret_access_key = ${AWS_SECRET_ACCESS_KEY}
          EOF
          cat > "$HOME/.aws/config" <<EOF
          [profile cache-ci]
          region = ${NIX_CACHE_S3_REGION}
          EOF
          chmod 600 "$HOME/.aws/credentials" "$HOME/.aws/config"

          sudo install -d -m 700 /root/.aws
          sudo cp "$HOME/.aws/credentials" /root/.aws/credentials
          sudo cp "$HOME/.aws/config" /root/.aws/config
          sudo chmod 600 /root/.aws/credentials /root/.aws/config

      - name: Verify Nix can read cache metadata
        if: ${{ steps.s3cache.outputs.upload_enabled == 'true' }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.NIX_CACHE_S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.NIX_CACHE_S3_SECRET_ACCESS_KEY }}
          NIX_CACHE_S3_BUCKET: ${{ steps.s3cache.outputs.bucket }}
          NIX_CACHE_S3_ENDPOINT: ${{ steps.s3cache.outputs.endpoint }}
          NIX_CACHE_S3_REGION: ${{ steps.s3cache.outputs.region }}
        run: |
          nix store info --store "s3://${NIX_CACHE_S3_BUCKET}?profile=cache-ci&scheme=https&endpoint=${NIX_CACHE_S3_ENDPOINT}&region=${NIX_CACHE_S3_REGION}" >/dev/null

      - name: Build production system closure
        env:
          S3_CACHE_ENABLED: ${{ steps.s3cache.outputs.enabled }}
          S3_CACHE_AUTH_ENABLED: ${{ steps.s3cache.outputs.upload_enabled }}
          NIX_CACHE_S3_BUCKET: ${{ steps.s3cache.outputs.bucket }}
          NIX_CACHE_S3_ENDPOINT: ${{ steps.s3cache.outputs.endpoint }}
          NIX_CACHE_S3_REGION: ${{ steps.s3cache.outputs.region }}
          AWS_ACCESS_KEY_ID: ${{ secrets.NIX_CACHE_S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.NIX_CACHE_S3_SECRET_ACCESS_KEY }}
        run: |
          build_log="$(mktemp)"
          echo "NIX_BUILD_LOG=$build_log" >> "$GITHUB_ENV"

          if [ "$S3_CACHE_ENABLED" = "true" ]; then
            if [ "$S3_CACHE_AUTH_ENABLED" = "true" ]; then
              nix build .#nixosConfigurations.truevipaccess.config.system.build.toplevel \
                --option extra-substituters "s3://${NIX_CACHE_S3_BUCKET}?profile=cache-ci&scheme=https&endpoint=${NIX_CACHE_S3_ENDPOINT}&region=${NIX_CACHE_S3_REGION}" \
                2> >(tee "$build_log" >&2)
            else
              nix build .#nixosConfigurations.truevipaccess.config.system.build.toplevel \
                --option extra-substituters "s3://${NIX_CACHE_S3_BUCKET}?scheme=https&endpoint=${NIX_CACHE_S3_ENDPOINT}&region=${NIX_CACHE_S3_REGION}" \
                2> >(tee "$build_log" >&2)
            fi
          else
            nix build .#nixosConfigurations.truevipaccess.config.system.build.toplevel \
              2> >(tee "$build_log" >&2)
          fi

      - name: Assert S3 cache read had no auth/path errors
        if: ${{ steps.s3cache.outputs.enabled == 'true' }}
        run: |
          if [ -z "${NIX_BUILD_LOG:-}" ] || [ ! -s "$NIX_BUILD_LOG" ]; then
            echo "Nix build log is missing or empty (NIX_BUILD_LOG='${NIX_BUILD_LOG:-unset}')." >&2
            exit 1
          fi

          if grep -nEi "AWS authentication failed|AccessDenied|nix-cache-info" "$NIX_BUILD_LOG"; then
            echo "Detected S3/cache-related error diagnostics in nix build log." >&2
            exit 1
          fi

      - name: Upload closure to Hetzner S3 cache
        if: ${{ steps.s3cache.outputs.upload_enabled == 'true' }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.NIX_CACHE_S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.NIX_CACHE_S3_SECRET_ACCESS_KEY }}
          NIX_CACHE_S3_BUCKET: ${{ steps.s3cache.outputs.bucket }}
          NIX_CACHE_S3_ENDPOINT: ${{ steps.s3cache.outputs.endpoint }}
          NIX_CACHE_S3_REGION: ${{ steps.s3cache.outputs.region }}
        run: |
          closure_path="$(nix path-info .#nixosConfigurations.truevipaccess.config.system.build.toplevel)"
          nix copy --to "s3://${NIX_CACHE_S3_BUCKET}?profile=cache-ci&scheme=https&endpoint=${NIX_CACHE_S3_ENDPOINT}&region=${NIX_CACHE_S3_REGION}" "$closure_path"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: read
    defaults:
      run:
        shell: bash -euo pipefail {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute build metadata
        run: |
          short_sha="${GITHUB_SHA:0:7}"
          echo "BUILD_NUMBER=${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"
          echo "CACHE_BUSTER=${short_sha}-${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_ENV"

      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

      - name: Trust deploy host
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "${DEPLOY_HOST_KEY}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
        env:
          DEPLOY_HOST_KEY: ${{ secrets.DEPLOY_HOST_KEY }}

      - name: Upload repo to host
        run: |
          ssh -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts "${DEPLOY_USER}@${DEPLOY_HOST}" 'install -d -m 700 /root/mailservice'
          rsync -az --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'result' \
            --exclude '.direnv' \
            -e 'ssh -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts' \
            ./ "${DEPLOY_USER}@${DEPLOY_HOST}:/root/mailservice/"
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}

      - name: Write environment file on host
        run: |
          tmp_file="$(mktemp)"
          cat > "$tmp_file" <<ENVCONTENT
          PUBLIC_BASE_URL=${PUBLIC_BASE_URL}
          MAIL_DOMAIN=${MAIL_DOMAIN}
          IMAP_HOST=${IMAP_HOST}
          IMAP_PORT=${IMAP_PORT}
          MAX_CONCURRENT_REQUESTS=${MAX_CONCURRENT_REQUESTS}
          MAILBOX_PRICE_CENTS=${MAILBOX_PRICE_CENTS}
          POLAR_TOKEN=${POLAR_TOKEN}
          POLAR_PRODUCT_ID=${POLAR_PRODUCT_ID}
          POLAR_SERVER_URL=${POLAR_SERVER_URL}
          POLAR_SUCCESS_URL=${POLAR_SUCCESS_URL}
          POLAR_RETURN_URL=${POLAR_RETURN_URL}
          POLAR_WEBHOOK_SECRET=${POLAR_WEBHOOK_SECRET}
          NOTIFIER_PROVIDER=${NOTIFIER_PROVIDER}
          UNSEND_KEY=${UNSEND_KEY}
          UNSEND_BASE_URL=${UNSEND_BASE_URL}
          UNSEND_FROM_EMAIL=${UNSEND_FROM_EMAIL}
          UNSEND_FROM_NAME=${UNSEND_FROM_NAME}
          MAILGUN_API_KEY=${MAILGUN_API_KEY}
          MAILGUN_DOMAIN=${MAILGUN_DOMAIN}
          MAILGUN_BASE_URL=${MAILGUN_BASE_URL}
          MAILGUN_FROM_EMAIL=${MAILGUN_FROM_EMAIL}
          MAILGUN_FROM_NAME=${MAILGUN_FROM_NAME}
          ADMIN_API_KEY=${ADMIN_API_KEY}
          EDPROOF_HMAC_SECRET=${EDPROOF_HMAC_SECRET}
          DATABASE_MODE=turso
          TURSO_DATABASE_URL=${TURSO_DATABASE_URL}
          TURSO_AUTH_TOKEN=${TURSO_AUTH_TOKEN}
          BUILD_NUMBER=${BUILD_NUMBER}
          CACHE_BUSTER=${CACHE_BUSTER}
          ENVCONTENT
          sed -i 's/^[[:space:]]*//' "$tmp_file"
          scp -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts "$tmp_file" "${DEPLOY_USER}@${DEPLOY_HOST}:/tmp/mailservice-env-stage"
          rm -f "$tmp_file"
          ssh -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts "${DEPLOY_USER}@${DEPLOY_HOST}" '
            set -eu
            install -d -m 750 /var/lib/secrets
            if getent group mailservice >/dev/null 2>&1; then
              install -m 640 -o root -g mailservice /tmp/mailservice-env-stage /var/lib/secrets/mailservice.env
            else
              install -m 640 -o root -g root /tmp/mailservice-env-stage /var/lib/secrets/mailservice.env
            fi
            rm -f /tmp/mailservice-env-stage
          '
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
          PUBLIC_BASE_URL: ${{ vars.PUBLIC_BASE_URL }}
          MAIL_DOMAIN: ${{ vars.MAIL_DOMAIN }}
          IMAP_HOST: ${{ vars.IMAP_HOST }}
          IMAP_PORT: ${{ vars.IMAP_PORT }}
          MAX_CONCURRENT_REQUESTS: ${{ vars.MAX_CONCURRENT_REQUESTS }}
          MAILBOX_PRICE_CENTS: ${{ vars.MAILBOX_PRICE_CENTS }}
          POLAR_TOKEN: ${{ secrets.POLAR_TOKEN }}
          POLAR_PRODUCT_ID: ${{ vars.POLAR_PRODUCT_ID }}
          POLAR_SERVER_URL: ${{ vars.POLAR_SERVER_URL }}
          POLAR_SUCCESS_URL: ${{ vars.POLAR_SUCCESS_URL }}
          POLAR_RETURN_URL: ${{ vars.POLAR_RETURN_URL }}
          POLAR_WEBHOOK_SECRET: ${{ secrets.POLAR_WEBHOOK_SECRET }}
          NOTIFIER_PROVIDER: ${{ vars.NOTIFIER_PROVIDER }}
          UNSEND_KEY: ${{ secrets.UNSEND_KEY }}
          UNSEND_BASE_URL: ${{ vars.UNSEND_BASE_URL }}
          UNSEND_FROM_EMAIL: ${{ vars.UNSEND_FROM_EMAIL }}
          UNSEND_FROM_NAME: ${{ vars.UNSEND_FROM_NAME }}
          MAILGUN_API_KEY: ${{ secrets.MAILGUN_API_KEY }}
          MAILGUN_DOMAIN: ${{ vars.MAILGUN_DOMAIN }}
          MAILGUN_BASE_URL: ${{ vars.MAILGUN_BASE_URL }}
          MAILGUN_FROM_EMAIL: ${{ vars.MAILGUN_FROM_EMAIL }}
          MAILGUN_FROM_NAME: ${{ vars.MAILGUN_FROM_NAME }}
          EDPROOF_HMAC_SECRET: ${{ secrets.EDPROOF_HMAC_SECRET }}
          TURSO_DATABASE_URL: ${{ vars.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          BUILD_NUMBER: ${{ env.BUILD_NUMBER }}
          CACHE_BUSTER: ${{ env.CACHE_BUSTER }}

      - name: Write cloudflared environment file on host
        run: |
          ssh -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts "${DEPLOY_USER}@${DEPLOY_HOST}" "
            set -eu
            install -d -m 750 /var/lib/secrets
            printf 'TUNNEL_TOKEN=%s\n' '${CLOUDFLARE_TUNNEL_TOKEN}' > /tmp/cloudflared-env-stage
            if getent group mailservice >/dev/null 2>&1; then
              install -m 640 -o root -g mailservice /tmp/cloudflared-env-stage /var/lib/secrets/cloudflared.env
            else
              install -m 640 -o root -g root /tmp/cloudflared-env-stage /var/lib/secrets/cloudflared.env
            fi
            rm -f /tmp/cloudflared-env-stage
          "
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          CLOUDFLARE_TUNNEL_TOKEN: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}

      - name: Validate required env vars on host
        run: |
          ssh -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts "${DEPLOY_USER}@${DEPLOY_HOST}" 'bash -se' <<'EOF'
            set -eu
            env_file="/var/lib/secrets/mailservice.env"
            missing=()
            for var in POLAR_TOKEN POLAR_PRODUCT_ID POLAR_WEBHOOK_SECRET MAIL_DOMAIN IMAP_HOST IMAP_PORT PUBLIC_BASE_URL EDPROOF_HMAC_SECRET; do
              if ! grep -q "^${var}=.\+" "$env_file" 2>/dev/null; then
                missing+=("$var")
              fi
            done
            if [ ${#missing[@]} -gt 0 ]; then
              printf 'FATAL: missing required vars in %s: %s\n' "$env_file" "${missing[*]}" >&2
              exit 1
            fi
          EOF
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}

      - name: Apply NixOS configuration
        run: |
          ssh -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts "${DEPLOY_USER}@${DEPLOY_HOST}" "
            set -eu
            cd /root/mailservice
            if [ -n \"${NIX_CACHE_S3_BUCKET}\" ] && [ -n \"${NIX_CACHE_S3_ENDPOINT}\" ] && [ -n \"${NIX_CACHE_S3_REGION}\" ]; then
              nixos-rebuild switch --flake .#truevipaccess \
                --option extra-substituters \"s3://${NIX_CACHE_S3_BUCKET}?scheme=https&endpoint=${NIX_CACHE_S3_ENDPOINT}&region=${NIX_CACHE_S3_REGION}\"
            else
              nixos-rebuild switch --flake .#truevipaccess
            fi
          "
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          NIX_CACHE_S3_BUCKET: ${{ needs.build.outputs.s3_cache_bucket }}
          NIX_CACHE_S3_ENDPOINT: ${{ needs.build.outputs.s3_cache_endpoint }}
          NIX_CACHE_S3_REGION: ${{ needs.build.outputs.s3_cache_region }}

      - name: Fix env file ownership after NixOS apply
        run: |
          ssh -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts "${DEPLOY_USER}@${DEPLOY_HOST}" '
            set -eu
            if getent group mailservice >/dev/null 2>&1; then
              chown root:mailservice /var/lib/secrets/mailservice.env
              chown root:mailservice /var/lib/secrets/cloudflared.env
            fi
          '
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}

      - name: Restart API to pick new env file
        run: |
          ssh -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts "${DEPLOY_USER}@${DEPLOY_HOST}" '
            sudo systemctl restart mailservice-api.service
          '
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}

      - name: Health check
        run: |
          ssh -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts "${DEPLOY_USER}@${DEPLOY_HOST}" '
            curl --fail --silent --show-error \
              --retry 10 --retry-delay 3 --retry-connrefused \
              http://127.0.0.1:8080/healthz
          '
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}

      - name: Ensure ACME certificates are current
        run: |
          ssh -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts "${DEPLOY_USER}@${DEPLOY_HOST}" '
            set -eu
            cert_dir="/var/lib/acme/mail.'"${MAIL_DOMAIN}"'"
            needs_renewal=false
            if [ ! -f "$cert_dir/fullchain.pem" ]; then
              needs_renewal=true
            else
              if ! issuer_output=$(sudo openssl x509 -in "$cert_dir/fullchain.pem" -noout -issuer 2>/dev/null); then
                needs_renewal=true
              elif echo "$issuer_output" | grep -qi minica; then
                needs_renewal=true
              fi
            fi
            if [ "$needs_renewal" = true ]; then
              echo "ACME cert missing, invalid, or self-signed, triggering renewal..."
              sudo systemctl reset-failed acme-mail.'"${MAIL_DOMAIN}"'.service 2>/dev/null || true
              if sudo systemctl start acme-mail.'"${MAIL_DOMAIN}"'.service; then
                echo "ACME renewal completed"
              else
                echo "ACME renewal failed:"
                sudo journalctl -u acme-mail.'"${MAIL_DOMAIN}"'.service --no-pager -n 20
                exit 1
              fi
            else
              echo "ACME cert is valid, no renewal needed"
            fi
          '
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          MAIL_DOMAIN: ${{ vars.MAIL_DOMAIN }}

      - name: Verify public build version
        env:
          PUBLIC_BASE_URL: ${{ vars.PUBLIC_BASE_URL }}
          BUILD_NUMBER: ${{ env.BUILD_NUMBER }}
          CACHE_BUSTER: ${{ env.CACHE_BUSTER }}
        run: |
          expected_build="Build: <code>${BUILD_NUMBER}</code>"
          expected_buster="Cache buster: <code>${CACHE_BUSTER}</code>"
          for attempt in $(seq 1 12); do
            page="$(curl --fail --silent --show-error --location --retry 5 --retry-delay 5 --retry-connrefused "${PUBLIC_BASE_URL}/?cb=${CACHE_BUSTER}")"
            if [[ "$page" == *"$expected_build"* && "$page" == *"$expected_buster"* ]]; then
              exit 0
            fi
            if [ "$attempt" -lt 12 ]; then
              sleep 5
            fi
          done

          echo "expected public page to contain: $expected_build" >&2
          echo "expected public page to contain: $expected_buster" >&2
          exit 1
