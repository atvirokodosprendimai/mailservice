name: Hetzner NixOS Snapshot

on:
  workflow_dispatch:
    inputs:
      location:
        description: "Hetzner location"
        required: true
        default: "hel1"
      server_type:
        description: "Hetzner server type"
        required: true
        default: "cpx22"
      nixos_channel:
        description: "NixOS channel for nixos-infect"
        required: true
        default: "nixos-24.11"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: bash -euo pipefail {0}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          curl -L https://github.com/hetznercloud/cli/releases/latest/download/hcloud-linux-amd64.tar.gz | tar -xz
          sudo install hcloud /usr/local/bin/hcloud

      - name: Start ssh-agent
        uses: webfactory/ssh-agent@e83874834305fe9a4a2997156cb26c5de65a8555 # v0.10.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

      - name: Write public key
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "${HETZNER_SSH_PUBLIC_KEY}" > ~/.ssh/mailservice-builder.pub
          printf '%s\n' "${DEPLOY_SSH_PRIVATE_KEY}" > ~/.ssh/mailservice-builder
          chmod 600 ~/.ssh/mailservice-builder
          chmod 600 ~/.ssh/mailservice-builder.pub
        env:
          HETZNER_SSH_PUBLIC_KEY: ${{ secrets.HETZNER_SSH_PUBLIC_KEY }}
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

      - name: Build NixOS snapshot
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_API }}
          PUBLIC_KEY_FILE: /home/runner/.ssh/mailservice-builder.pub
          PRIVATE_KEY_FILE: /home/runner/.ssh/mailservice-builder
          LOCATION: ${{ github.event.inputs.location }}
          SERVER_TYPE: ${{ github.event.inputs.server_type }}
          NIXOS_CHANNEL: ${{ github.event.inputs.nixos_channel }}
        run: |
          bash ./ops/hetzner-nixos-image/build_snapshot.sh | tee snapshot.txt

      - name: Ensure snapshot output exists
        run: |
          test -s snapshot.txt
          grep -q '^snapshot_id=' snapshot.txt

      - name: Upload snapshot result
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: nixos-snapshot-${{ github.run_id }}
          path: snapshot.txt
          retention-days: 7
