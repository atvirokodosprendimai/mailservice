name: Deploy Smoke Test Server

on:
  workflow_call:
  workflow_dispatch:

concurrency:
  group: smoke-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    outputs:
      s3_cache_enabled: ${{ steps.s3cache.outputs.enabled }}
      s3_cache_bucket: ${{ steps.s3cache.outputs.bucket }}
      s3_cache_endpoint: ${{ steps.s3cache.outputs.endpoint }}
      s3_cache_region: ${{ steps.s3cache.outputs.region }}
    runs-on: ubuntu-latest
    environment:
      name: smoke
    permissions:
      contents: read
    defaults:
      run:
        shell: bash -euo pipefail {0}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Detect S3 cache configuration
        id: s3cache
        env:
          NIX_CACHE_S3_BUCKET: ${{ vars.NIX_CACHE_S3_BUCKET }}
          NIX_CACHE_S3_ENDPOINT: ${{ vars.NIX_CACHE_S3_ENDPOINT }}
          NIX_CACHE_S3_REGION: ${{ vars.NIX_CACHE_S3_REGION }}
          NIX_CACHE_S3_ACCESS_KEY_ID: ${{ secrets.NIX_CACHE_S3_ACCESS_KEY_ID }}
          NIX_CACHE_S3_SECRET_ACCESS_KEY: ${{ secrets.NIX_CACHE_S3_SECRET_ACCESS_KEY }}
          TOFU_STATE_BUCKET: ${{ secrets.TOFU_STATE_BUCKET }}
          TOFU_STATE_ENDPOINT: ${{ secrets.TOFU_STATE_ENDPOINT }}
          TOFU_STATE_REGION: ${{ secrets.TOFU_STATE_REGION }}
        run: |
          set -eu

          bucket="${NIX_CACHE_S3_BUCKET:-}"
          endpoint="${NIX_CACHE_S3_ENDPOINT:-}"
          region="${NIX_CACHE_S3_REGION:-}"

          if [ -z "$bucket" ] && [ -n "${TOFU_STATE_BUCKET:-}" ]; then
            bucket="${TOFU_STATE_BUCKET}-nix-cache"
          fi
          if [ -z "$endpoint" ] && [ -n "${TOFU_STATE_ENDPOINT:-}" ]; then
            endpoint="$TOFU_STATE_ENDPOINT"
          fi
          if [ -z "$region" ] && [ -n "${TOFU_STATE_REGION:-}" ]; then
            region="$TOFU_STATE_REGION"
          fi

          endpoint="${endpoint#http://}"
          endpoint="${endpoint#https://}"

          if [ -z "$region" ] && [ -n "$endpoint" ]; then
            region="${endpoint%%.*}"
          fi

          if [ -n "$bucket" ] && [ -n "$endpoint" ] && [ -n "$region" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

          echo "bucket=$bucket" >> "$GITHUB_OUTPUT"
          echo "endpoint=$endpoint" >> "$GITHUB_OUTPUT"
          echo "region=$region" >> "$GITHUB_OUTPUT"

      - name: Build smoke system closure
        env:
          S3_CACHE_ENABLED: ${{ steps.s3cache.outputs.enabled }}
          NIX_CACHE_S3_BUCKET: ${{ steps.s3cache.outputs.bucket }}
          NIX_CACHE_S3_ENDPOINT: ${{ steps.s3cache.outputs.endpoint }}
          NIX_CACHE_S3_REGION: ${{ steps.s3cache.outputs.region }}
        run: |
          if [ "$S3_CACHE_ENABLED" = "true" ]; then
            nix build .#nixosConfigurations.smoke.config.system.build.toplevel \
              --option extra-substituters "s3://${NIX_CACHE_S3_BUCKET}?scheme=https&endpoint=${NIX_CACHE_S3_ENDPOINT}&region=${NIX_CACHE_S3_REGION}"
          else
            nix build .#nixosConfigurations.smoke.config.system.build.toplevel
          fi

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: smoke
    permissions:
      contents: read
    defaults:
      run:
        shell: bash -euo pipefail {0}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Compute build metadata
        run: |
          short_sha="${GITHUB_SHA:0:7}"
          echo "BUILD_NUMBER=${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"
          echo "CACHE_BUSTER=${short_sha}-${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_ENV"

      - name: Start ssh-agent
        uses: webfactory/ssh-agent@e83874834305fe9a4a2997156cb26c5de65a8555 # v0.10.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

      - name: Trust deploy host
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "${DEPLOY_HOST_KEY}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
        env:
          DEPLOY_HOST_KEY: ${{ secrets.DEPLOY_HOST_KEY }}

      - name: Upload repo to host
        run: |
          ssh -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts "${DEPLOY_USER}@${DEPLOY_HOST}" 'install -d -m 700 /root/mailservice'
          rsync -az --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'result' \
            --exclude '.direnv' \
            -e 'ssh -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts' \
            ./ "${DEPLOY_USER}@${DEPLOY_HOST}:/root/mailservice/"
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}

      - name: Write environment file on host
        run: |
          # Build env file using printf to avoid shell expansion of secret values.
          # Piped directly into a private staging area on the remote host.
          tmp_file="$(mktemp)"
          chmod 600 "$tmp_file"
          {
            printf 'PUBLIC_BASE_URL=%s\n' "$PUBLIC_BASE_URL"
            printf 'MAIL_DOMAIN=%s\n' "$MAIL_DOMAIN"
            printf 'IMAP_HOST=%s\n' "$IMAP_HOST"
            printf 'IMAP_PORT=%s\n' "$IMAP_PORT"
            printf 'MAX_CONCURRENT_REQUESTS=%s\n' "$MAX_CONCURRENT_REQUESTS"
            printf 'MAILBOX_PRICE_CENTS=%s\n' "$MAILBOX_PRICE_CENTS"
            printf 'POLAR_TOKEN=%s\n' "$POLAR_TOKEN"
            printf 'POLAR_PRODUCT_ID=%s\n' "$POLAR_PRODUCT_ID"
            printf 'POLAR_SERVER_URL=%s\n' "$POLAR_SERVER_URL"
            printf 'POLAR_SUCCESS_URL=%s\n' "$POLAR_SUCCESS_URL"
            printf 'POLAR_RETURN_URL=%s\n' "$POLAR_RETURN_URL"
            printf 'POLAR_WEBHOOK_SECRET=%s\n' "$POLAR_WEBHOOK_SECRET"
            printf 'POLAR_GIFT_DISCOUNT_ID=%s\n' "$POLAR_GIFT_DISCOUNT_ID"
            printf 'POLAR_GIFT_COUPON_CODE=%s\n' "$POLAR_GIFT_COUPON_CODE"
            printf 'EDPROOF_HMAC_SECRET=%s\n' "$EDPROOF_HMAC_SECRET"
            printf 'DATABASE_MODE=local\n'
            printf 'TURSO_DATABASE_URL=%s\n' "$TURSO_DATABASE_URL"
            printf 'TURSO_AUTH_TOKEN=%s\n' "$TURSO_AUTH_TOKEN"
            printf 'BUILD_NUMBER=%s\n' "$BUILD_NUMBER"
            printf 'CACHE_BUSTER=%s\n' "$CACHE_BUSTER"
            printf 'ADMIN_API_KEY=%s\n' "$ADMIN_API_KEY"
          } > "$tmp_file"
          # Stage env file into a private directory on the remote host (not /tmp).
          ssh -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts "${DEPLOY_USER}@${DEPLOY_HOST}" 'install -d -m 700 /root/.mailservice-staging'
          scp -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts "$tmp_file" "${DEPLOY_USER}@${DEPLOY_HOST}:/root/.mailservice-staging/env-stage"
          rm -f "$tmp_file"
          ssh -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts "${DEPLOY_USER}@${DEPLOY_HOST}" '
            set -eu
            install -d -m 750 /var/lib/secrets
            chmod 600 /root/.mailservice-staging/env-stage
            if getent group mailservice >/dev/null 2>&1; then
              install -m 640 -o root -g mailservice /root/.mailservice-staging/env-stage /var/lib/secrets/mailservice.env
            else
              install -m 640 -o root -g root /root/.mailservice-staging/env-stage /var/lib/secrets/mailservice.env
            fi
            rm -f /root/.mailservice-staging/env-stage
          '
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          PUBLIC_BASE_URL: ${{ vars.PUBLIC_BASE_URL }}
          MAIL_DOMAIN: ${{ vars.MAIL_DOMAIN }}
          IMAP_HOST: ${{ vars.IMAP_HOST }}
          IMAP_PORT: ${{ vars.IMAP_PORT }}
          MAX_CONCURRENT_REQUESTS: ${{ vars.MAX_CONCURRENT_REQUESTS }}
          MAILBOX_PRICE_CENTS: ${{ vars.MAILBOX_PRICE_CENTS }}
          POLAR_TOKEN: ${{ secrets.POLAR_TOKEN }}
          POLAR_PRODUCT_ID: ${{ vars.POLAR_PRODUCT_ID }}
          POLAR_SERVER_URL: ${{ vars.POLAR_SERVER_URL }}
          POLAR_SUCCESS_URL: ${{ vars.POLAR_SUCCESS_URL }}
          POLAR_RETURN_URL: ${{ vars.POLAR_RETURN_URL }}
          POLAR_WEBHOOK_SECRET: ${{ secrets.POLAR_WEBHOOK_SECRET }}
          POLAR_GIFT_DISCOUNT_ID: ${{ vars.POLAR_GIFT_DISCOUNT_ID }}
          POLAR_GIFT_COUPON_CODE: ${{ vars.POLAR_GIFT_COUPON_CODE }}
          EDPROOF_HMAC_SECRET: ${{ secrets.EDPROOF_HMAC_SECRET }}
          TURSO_DATABASE_URL: ${{ vars.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          BUILD_NUMBER: ${{ env.BUILD_NUMBER }}
          CACHE_BUSTER: ${{ env.CACHE_BUSTER }}
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}

      - name: Validate required env vars on host
        run: |
          ssh -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts "${DEPLOY_USER}@${DEPLOY_HOST}" 'bash -se' <<'EOF'
            set -eu
            env_file="/var/lib/secrets/mailservice.env"
            missing=()
            for var in POLAR_TOKEN POLAR_PRODUCT_ID POLAR_WEBHOOK_SECRET EDPROOF_HMAC_SECRET MAIL_DOMAIN IMAP_HOST IMAP_PORT PUBLIC_BASE_URL; do
              if ! grep -q "^${var}=.\+" "$env_file" 2>/dev/null; then
                missing+=("$var")
              fi
            done
            if [ ${#missing[@]} -gt 0 ]; then
              printf 'FATAL: missing required vars in %s: %s\n' "$env_file" "${missing[*]}" >&2
              exit 1
            fi
          EOF
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}

      - name: Apply NixOS configuration
        run: |
          ssh -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts "${DEPLOY_USER}@${DEPLOY_HOST}" "
            set -eu
            cd /root/mailservice
            if [ -n \"${NIX_CACHE_S3_BUCKET}\" ] && [ -n \"${NIX_CACHE_S3_ENDPOINT}\" ] && [ -n \"${NIX_CACHE_S3_REGION}\" ]; then
              nixos-rebuild switch --flake .#smoke \
                --option extra-substituters \"s3://${NIX_CACHE_S3_BUCKET}?scheme=https&endpoint=${NIX_CACHE_S3_ENDPOINT}&region=${NIX_CACHE_S3_REGION}\"
            else
              nixos-rebuild switch --flake .#smoke
            fi
          "
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          NIX_CACHE_S3_BUCKET: ${{ needs.build.outputs.s3_cache_bucket }}
          NIX_CACHE_S3_ENDPOINT: ${{ needs.build.outputs.s3_cache_endpoint }}
          NIX_CACHE_S3_REGION: ${{ needs.build.outputs.s3_cache_region }}

      - name: Fix env file ownership after NixOS apply
        run: |
          ssh -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts "${DEPLOY_USER}@${DEPLOY_HOST}" '
            set -eu
            if getent group mailservice >/dev/null 2>&1; then
              chown root:mailservice /var/lib/secrets/mailservice.env
            fi
          '
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}

      - name: Restart API to pick new env file
        run: |
          ssh -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts "${DEPLOY_USER}@${DEPLOY_HOST}" '
            sudo systemctl restart mailservice-api.service
          '
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}

      - name: Health check
        run: |
          ssh -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts "${DEPLOY_USER}@${DEPLOY_HOST}" '
            curl --fail --silent --show-error \
              --retry 10 --retry-delay 3 --retry-connrefused \
              http://127.0.0.1:8080/healthz
          '
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}

      - name: Ensure ACME certificates are current
        run: |
          ssh -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts "${DEPLOY_USER}@${DEPLOY_HOST}" '
            set -eu
            for domain in mail.'"${MAIL_DOMAIN}"' '"${MAIL_DOMAIN}"'; do
              cert_dir="/var/lib/acme/${domain}"
              [ -d "$cert_dir" ] || continue
              needs_renewal=false
              if [ ! -f "$cert_dir/fullchain.pem" ]; then
                needs_renewal=true
              else
                if ! issuer_output=$(sudo openssl x509 -in "$cert_dir/fullchain.pem" -noout -issuer 2>/dev/null); then
                  needs_renewal=true
                elif echo "$issuer_output" | grep -qi minica; then
                  needs_renewal=true
                fi
              fi
              if [ "$needs_renewal" = true ]; then
                echo "ACME cert for ${domain} missing or invalid, triggering renewal..."
                sudo systemctl reset-failed "acme-${domain}.service" 2>/dev/null || true
                if sudo systemctl start "acme-${domain}.service"; then
                  echo "ACME renewal for ${domain} completed"
                else
                  echo "ACME renewal for ${domain} failed:"
                  sudo journalctl -u "acme-${domain}.service" --no-pager -n 20
                  exit 1
                fi
              else
                echo "ACME cert for ${domain} is valid"
              fi
            done
          '
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          MAIL_DOMAIN: ${{ vars.MAIL_DOMAIN }}
