name: Turso Seed from Production

on:
  workflow_dispatch:

jobs:
  seed:
    runs-on: ubuntu-latest
    environment:
      name: production
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

      - name: Trust deploy host
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "${DEPLOY_HOST_KEY}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
        env:
          DEPLOY_HOST_KEY: ${{ secrets.DEPLOY_HOST_KEY }}

      - name: Download production database
        run: |
          scp -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts \
            "${DEPLOY_USER}@${DEPLOY_HOST}:/var/lib/mailservice/data/mailservice.db" \
            /tmp/mailservice-production.db
          ls -la /tmp/mailservice-production.db
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}

      - name: Dump data as SQL
        run: |
          sqlite3 /tmp/mailservice-production.db ".dump" > /tmp/dump-full.sql
          echo "=== Tables ==="
          sqlite3 /tmp/mailservice-production.db ".tables"
          echo "=== Row counts ==="
          for t in mailboxes accounts mail_users mail_domains goose_db_version; do
            echo "$t: $(sqlite3 /tmp/mailservice-production.db "SELECT count(*) FROM $t;" 2>/dev/null || echo 'N/A')"
          done
          echo "=== Dump size ==="
          wc -l /tmp/dump-full.sql

      - name: Import to Turso via libsql HTTP API
        run: |
          TURSO_HTTP_URL="${TURSO_DATABASE_URL/libsql:\/\//https://}"

          # Filter the dump: keep CREATE TABLE, INSERT, CREATE INDEX, CREATE UNIQUE INDEX
          # Skip: BEGIN/COMMIT/DELETE (sqlite dump artifacts), goose version inserts (let goose manage itself)
          grep -E '^(CREATE TABLE|CREATE INDEX|CREATE UNIQUE INDEX|INSERT INTO)' /tmp/dump-full.sql \
            | grep -v 'goose_db_version' \
            > /tmp/dump-filtered.sql || true

          # Add goose version inserts separately (needed so goose doesn't re-run migrations)
          grep -E '^INSERT INTO "?goose_db_version"?' /tmp/dump-full.sql >> /tmp/dump-filtered.sql || true

          if [ ! -s /tmp/dump-filtered.sql ]; then
            echo "No statements to import"
            exit 0
          fi

          echo "=== Statements to import ==="
          cat /tmp/dump-filtered.sql
          echo "=== Total: $(wc -l < /tmp/dump-filtered.sql) statements ==="

          # Execute each statement via Turso HTTP API
          FAILED=0
          while IFS= read -r stmt; do
            # Skip empty lines
            [ -z "$stmt" ] && continue
            echo ">>> ${stmt:0:120}..."
            response=$(curl -s -X POST "${TURSO_HTTP_URL}/v3/pipeline" \
              -H "Authorization: Bearer ${TURSO_AUTH_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"requests\":[{\"type\":\"execute\",\"stmt\":{\"sql\":$(echo "$stmt" | jq -Rs .)}},{\"type\":\"close\"}]}")
            result_type=$(echo "$response" | jq -r '.results[0].response.type // "error"' 2>/dev/null)
            if [ "$result_type" = "error" ]; then
              error_msg=$(echo "$response" | jq -r '.results[0].response.error.message // "unknown"' 2>/dev/null)
              echo "  ERROR: $error_msg"
              FAILED=$((FAILED + 1))
            else
              echo "  ok"
            fi
          done < /tmp/dump-filtered.sql

          if [ "$FAILED" -gt 0 ]; then
            echo "WARNING: $FAILED statements failed"
          fi
        env:
          TURSO_DATABASE_URL: ${{ vars.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}

      - name: Verify Turso data
        run: |
          TURSO_HTTP_URL="${TURSO_DATABASE_URL/libsql:\/\//https://}"
          echo "=== Mailbox count ==="
          curl -s -X POST "${TURSO_HTTP_URL}/v3/pipeline" \
            -H "Authorization: Bearer ${TURSO_AUTH_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"requests":[{"type":"execute","stmt":{"sql":"SELECT count(*) as total FROM mailboxes"}},{"type":"close"}]}' \
            | jq '.results[0].response.result.rows'
          echo "=== All mailboxes ==="
          curl -s -X POST "${TURSO_HTTP_URL}/v3/pipeline" \
            -H "Authorization: Bearer ${TURSO_AUTH_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"requests":[{"type":"execute","stmt":{"sql":"SELECT id, status, billing_email FROM mailboxes"}},{"type":"close"}]}' \
            | jq '.results[0].response.result.rows'
        env:
          TURSO_DATABASE_URL: ${{ vars.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
