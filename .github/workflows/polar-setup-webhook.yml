name: Polar Webhook Setup

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment (smoke)"
        required: true
        default: "smoke"

permissions:
  contents: read

jobs:
  setup:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment }}
    permissions:
      contents: read
    defaults:
      run:
        shell: bash -euo pipefail {0}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup webhook and get secret
        env:
          POLAR_TOKEN: ${{ secrets.POLAR_TOKEN }}
          POLAR_API: ${{ vars.POLAR_SERVER_URL }}
          WEBHOOK_URL: "${{ vars.PUBLIC_BASE_URL }}/v1/webhooks/polar"
        run: |
          SECRET=$(ops/polar-setup-webhook.sh)
          echo "$SECRET" > /tmp/webhook-secret.txt
          echo "Webhook endpoint is ready."

      - name: Check recent deliveries
        env:
          POLAR_TOKEN: ${{ secrets.POLAR_TOKEN }}
          POLAR_API: ${{ vars.POLAR_SERVER_URL }}
        run: ops/polar-check-deliveries.sh

      - name: Upload secret as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: polar-webhook-secret
          path: /tmp/webhook-secret.txt
          retention-days: 1

      - name: Instructions
        run: |
          echo ""
          echo "=== Next Steps ==="
          echo "1. Download the 'polar-webhook-secret' artifact from this run"
          echo "2. Set it as the POLAR_WEBHOOK_SECRET secret:"
          echo "   gh secret set POLAR_WEBHOOK_SECRET --env ${{ github.event.inputs.environment }}"
          echo "3. Paste the secret value from the artifact"
          echo ""
