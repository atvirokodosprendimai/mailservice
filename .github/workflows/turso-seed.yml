name: Turso Seed from Production

on:
  workflow_dispatch:

jobs:
  seed:
    runs-on: ubuntu-latest
    environment:
      name: production
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install Turso CLI
        run: |
          curl -sSfL https://get.tur.so/install.sh | bash
          echo "$HOME/.turso" >> $GITHUB_PATH

      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

      - name: Trust deploy host
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "${DEPLOY_HOST_KEY}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
        env:
          DEPLOY_HOST_KEY: ${{ secrets.DEPLOY_HOST_KEY }}

      - name: Download production database
        run: |
          scp -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts \
            "${DEPLOY_USER}@${DEPLOY_HOST}:/var/lib/mailservice/data/mailservice.db" \
            /tmp/mailservice-production.db
          ls -la /tmp/mailservice-production.db
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}

      - name: Extract and import data
        run: |
          echo "=== Source row counts ==="
          for t in mailboxes accounts mail_users mail_domains; do
            echo "$t: $(sqlite3 /tmp/mailservice-production.db "SELECT count(*) FROM $t;" 2>/dev/null || echo 'N/A')"
          done

          # Extract INSERT statements for data tables only (skip goose_db_version — already seeded with schema)
          sqlite3 /tmp/mailservice-production.db ".dump" \
            | grep -E '^INSERT INTO' \
            | grep -v 'goose_db_version' \
            | grep -v 'sqlite_sequence' \
            > /tmp/data-inserts.sql || true

          echo "=== INSERT statements ==="
          cat /tmp/data-inserts.sql

          if [ ! -s /tmp/data-inserts.sql ]; then
            echo "No data to import"
            exit 0
          fi

          echo "=== Importing to Turso ==="
          $HOME/.turso/turso db shell production < /tmp/data-inserts.sql
          echo "Import complete"
        env:
          TURSO_API_TOKEN: ${{ secrets.TURSO_API_TOKEN }}

      - name: Verify Turso data
        run: |
          echo "=== Turso row counts ==="
          for t in mailboxes accounts mail_users mail_domains; do
            echo -n "$t: "
            $HOME/.turso/turso db shell production "SELECT count(*) FROM $t;" 2>/dev/null || echo 'N/A'
          done
          echo ""
          echo "=== Mailboxes ==="
          $HOME/.turso/turso db shell production "SELECT id, status, billing_email FROM mailboxes ORDER BY created_at DESC;"
        env:
          TURSO_API_TOKEN: ${{ secrets.TURSO_API_TOKEN }}
