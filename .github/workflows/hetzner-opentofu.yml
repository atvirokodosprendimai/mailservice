name: Hetzner OpenTofu

env:
  REGISTRY: ghcr.io

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/hetzner-opentofu.yml"
      - "infra/opentofu/**"
      - "docs/hetzner-cicd.md"
  workflow_dispatch:
    inputs:
      apply:
        description: "Apply infrastructure changes"
        required: true
        default: "false"
      environment:
        description: "Deployment environment name"
        required: true
        default: "production"
      image:
        description: "Hetzner server image or snapshot id"
        required: true
        default: "ubuntu-24.04"
      name:
        description: "Deployment name prefix"
        required: true
        default: "mailservice"
      bootstrap_mode:
        description: "Host bootstrap mode"
        required: true
        default: "ubuntu-docker"

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/opentofu
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_wrapper: false

      - name: OpenTofu fmt
        run: tofu fmt -check

      - name: OpenTofu init (no backend)
        run: |
          for attempt in 1 2 3; do
            if tofu init -backend=false; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            sleep 5
          done

      - name: OpenTofu validate
        env:
          TF_VAR_hcloud_token: "placeholder"
          TF_VAR_ssh_public_key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIKplaceholder mailservice@example"
          TF_VAR_public_base_url: "https://example.invalid"
          TF_VAR_image: "ubuntu-24.04"
          TF_VAR_name: "mailservice"
          TF_VAR_bootstrap_mode: "ubuntu-docker"
        run: tofu validate

  plan:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: validate
    defaults:
      run:
        working-directory: infra/opentofu
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_wrapper: false

      - name: Write backend config
        run: |
          cat > backend.hcl <<EOF
          bucket = "${TOFU_STATE_BUCKET}"
          key    = "mailservice/${DEPLOY_ENV}/terraform.tfstate"
          region = "${TOFU_STATE_REGION}"
          endpoints = {
            s3 = "${TOFU_STATE_ENDPOINT}"
          }
          access_key = "${TOFU_STATE_ACCESS_KEY}"
          secret_key = "${TOFU_STATE_SECRET_KEY}"
          skip_credentials_validation = true
          skip_requesting_account_id  = true
          skip_metadata_api_check     = true
          use_path_style              = true
          EOF
        env:
          DEPLOY_ENV: ${{ github.event.inputs.environment }}
          TOFU_STATE_BUCKET: ${{ secrets.TOFU_STATE_BUCKET }}
          TOFU_STATE_REGION: ${{ secrets.TOFU_STATE_REGION }}
          TOFU_STATE_ENDPOINT: ${{ secrets.TOFU_STATE_ENDPOINT }}
          TOFU_STATE_ACCESS_KEY: ${{ secrets.TOFU_STATE_ACCESS_KEY }}
          TOFU_STATE_SECRET_KEY: ${{ secrets.TOFU_STATE_SECRET_KEY }}

      - name: OpenTofu init
        run: |
          for attempt in 1 2 3; do
            if tofu init -backend-config=backend.hcl; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            sleep 5
          done

      - name: OpenTofu plan
        env:
          TF_VAR_hcloud_token: ${{ secrets.HCLOUD_API }}
          TF_VAR_name: ${{ github.event.inputs.name }}
          TF_VAR_ssh_public_key: ${{ secrets.HETZNER_SSH_PUBLIC_KEY }}
          TF_VAR_public_base_url: ${{ vars.PUBLIC_BASE_URL }}
          TF_VAR_image: ${{ github.event.inputs.image }}
          TF_VAR_bootstrap_mode: ${{ github.event.inputs.bootstrap_mode }}
        run: tofu plan -input=false -out=tfplan

      - name: Render plan summary
        run: tofu show -no-color tfplan > tfplan.txt

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: opentofu-plan-${{ github.run_id }}
          path: |
            infra/opentofu/tfplan
            infra/opentofu/tfplan.txt
          retention-days: 7

  apply:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.apply == 'true'
    runs-on: ubuntu-latest
    needs: plan
    environment:
      name: ${{ github.event.inputs.environment }}
    defaults:
      run:
        working-directory: infra/opentofu
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_wrapper: false

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: opentofu-plan-${{ github.run_id }}
          path: infra/opentofu

      - name: Write backend config
        run: |
          cat > backend.hcl <<EOF
          bucket = "${TOFU_STATE_BUCKET}"
          key    = "mailservice/${DEPLOY_ENV}/terraform.tfstate"
          region = "${TOFU_STATE_REGION}"
          endpoints = {
            s3 = "${TOFU_STATE_ENDPOINT}"
          }
          access_key = "${TOFU_STATE_ACCESS_KEY}"
          secret_key = "${TOFU_STATE_SECRET_KEY}"
          skip_credentials_validation = true
          skip_requesting_account_id  = true
          skip_metadata_api_check     = true
          use_path_style              = true
          EOF
        env:
          DEPLOY_ENV: ${{ github.event.inputs.environment }}
          TOFU_STATE_BUCKET: ${{ secrets.TOFU_STATE_BUCKET }}
          TOFU_STATE_REGION: ${{ secrets.TOFU_STATE_REGION }}
          TOFU_STATE_ENDPOINT: ${{ secrets.TOFU_STATE_ENDPOINT }}
          TOFU_STATE_ACCESS_KEY: ${{ secrets.TOFU_STATE_ACCESS_KEY }}
          TOFU_STATE_SECRET_KEY: ${{ secrets.TOFU_STATE_SECRET_KEY }}

      - name: OpenTofu init
        run: |
          for attempt in 1 2 3; do
            if tofu init -backend-config=backend.hcl; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            sleep 5
          done

      - name: OpenTofu apply
        env:
          TF_VAR_hcloud_token: ${{ secrets.HCLOUD_API }}
          TF_VAR_name: ${{ github.event.inputs.name }}
          TF_VAR_ssh_public_key: ${{ secrets.HETZNER_SSH_PUBLIC_KEY }}
          TF_VAR_public_base_url: ${{ vars.PUBLIC_BASE_URL }}
          TF_VAR_image: ${{ github.event.inputs.image }}
          TF_VAR_bootstrap_mode: ${{ github.event.inputs.bootstrap_mode }}
        run: tofu apply -input=false -auto-approve tfplan

  deploy:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.apply == 'true' && github.event.inputs.bootstrap_mode == 'ubuntu-docker'
    runs-on: ubuntu-latest
    needs: apply
    environment:
      name: ${{ github.event.inputs.environment }}
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image refs
        id: images
        run: |
          repo_lc="${GITHUB_REPOSITORY,,}"
          short_sha="${GITHUB_SHA:0:7}"
          echo "api=${{ env.REGISTRY }}/${repo_lc}-api:sha-${short_sha}" >> "$GITHUB_OUTPUT"
          echo "mailreceive=${{ env.REGISTRY }}/${repo_lc}-mailreceive:sha-${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for published images
        env:
          API_IMAGE: ${{ steps.images.outputs.api }}
          MAILRECEIVE_IMAGE: ${{ steps.images.outputs.mailreceive }}
        run: |
          for image in "$API_IMAGE" "$MAILRECEIVE_IMAGE"; do
            for attempt in $(seq 1 30); do
              if docker manifest inspect "$image" >/dev/null 2>&1; then
                break
              fi
              if [ "$attempt" -eq 30 ]; then
                echo "image not available: $image" >&2
                exit 1
              fi
              sleep 20
            done
          done

      - name: Write production env
        run: |
          umask 077
          cat > production.env <<EOF
          API_IMAGE=${API_IMAGE}
          MAILRECEIVE_IMAGE=${MAILRECEIVE_IMAGE}
          PUBLIC_BASE_URL=${PUBLIC_BASE_URL}
          MAIL_DOMAIN=${MAIL_DOMAIN}
          IMAP_HOST=${IMAP_HOST}
          IMAP_PORT=${IMAP_PORT}
          MAX_CONCURRENT_REQUESTS=${MAX_CONCURRENT_REQUESTS}
          POLAR_TOKEN=${POLAR_TOKEN}
          POLAR_PRICE_ID=${POLAR_PRICE_ID}
          POLAR_SERVER_URL=${POLAR_SERVER_URL}
          POLAR_SUCCESS_URL=${POLAR_SUCCESS_URL}
          POLAR_RETURN_URL=${POLAR_RETURN_URL}
          POLAR_WEBHOOK_SECRET=${POLAR_WEBHOOK_SECRET}
          STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
          STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
          STRIPE_SUCCESS_URL=${STRIPE_SUCCESS_URL}
          STRIPE_CANCEL_URL=${STRIPE_CANCEL_URL}
          STRIPE_CURRENCY=${STRIPE_CURRENCY}
          MAILBOX_PRICE_CENTS=${MAILBOX_PRICE_CENTS}
          CLOUDFLARE_TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
          EOF
          chmod 600 production.env
        env:
          API_IMAGE: ${{ steps.images.outputs.api }}
          MAILRECEIVE_IMAGE: ${{ steps.images.outputs.mailreceive }}
          PUBLIC_BASE_URL: ${{ vars.PUBLIC_BASE_URL }}
          MAIL_DOMAIN: ${{ vars.MAIL_DOMAIN }}
          IMAP_HOST: ${{ vars.IMAP_HOST }}
          IMAP_PORT: ${{ vars.IMAP_PORT }}
          MAX_CONCURRENT_REQUESTS: ${{ vars.MAX_CONCURRENT_REQUESTS }}
          POLAR_TOKEN: ${{ secrets.POLAR_TOKEN }}
          POLAR_PRICE_ID: ${{ vars.POLAR_PRICE_ID }}
          POLAR_SERVER_URL: ${{ vars.POLAR_SERVER_URL }}
          POLAR_SUCCESS_URL: ${{ vars.POLAR_SUCCESS_URL }}
          POLAR_RETURN_URL: ${{ vars.POLAR_RETURN_URL }}
          POLAR_WEBHOOK_SECRET: ${{ secrets.POLAR_WEBHOOK_SECRET }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_SUCCESS_URL: ${{ vars.STRIPE_SUCCESS_URL }}
          STRIPE_CANCEL_URL: ${{ vars.STRIPE_CANCEL_URL }}
          STRIPE_CURRENCY: ${{ vars.STRIPE_CURRENCY }}
          MAILBOX_PRICE_CENTS: ${{ vars.MAILBOX_PRICE_CENTS }}
          CLOUDFLARE_TUNNEL_TOKEN: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}

      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

      - name: Trust deploy host
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "${DEPLOY_HOST_KEY}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
        env:
          DEPLOY_HOST_KEY: ${{ secrets.DEPLOY_HOST_KEY }}

      - name: Upload runtime files
        run: |
          ssh -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts "${DEPLOY_USER}@${DEPLOY_HOST}" '
            install -d -m 700 /opt/mailservice
          '
          scp -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts \
            compose.tunnel.yml.example "${DEPLOY_USER}@${DEPLOY_HOST}:/opt/mailservice/compose.yml"
          scp -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts \
            production.env "${DEPLOY_USER}@${DEPLOY_HOST}:/opt/mailservice/production.env"
          ssh -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts "${DEPLOY_USER}@${DEPLOY_HOST}" '
            chmod 600 /opt/mailservice/production.env
          '
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}

      - name: Deploy compose stack
        run: |
          ssh -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts "${DEPLOY_USER}@${DEPLOY_HOST}" '
            set -eu
            cd /opt/mailservice
            set -a
            . ./production.env
            set +a

            if docker compose version >/dev/null 2>&1; then
              compose_cmd="docker compose"
            elif command -v docker-compose >/dev/null 2>&1; then
              compose_cmd="docker-compose"
            else
              apt-get update
              if apt-get install -y docker-compose-plugin; then
                compose_cmd="docker compose"
              elif apt-get install -y docker-compose-v2; then
                compose_cmd="docker compose"
              elif apt-get install -y docker-compose; then
                compose_cmd="docker-compose"
              else
                echo "failed to install docker compose" >&2
                exit 1
              fi
            fi

            $compose_cmd -f compose.yml pull
            $compose_cmd -f compose.yml up -d
          '
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}

      - name: Health check
        run: |
          ssh -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts "${DEPLOY_USER}@${DEPLOY_HOST}" '
            curl --fail --silent --show-error \
              --retry 10 --retry-delay 3 --retry-connrefused \
              http://127.0.0.1:8080/healthz
          '
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
