name: Hetzner Server Reboot

on:
  workflow_dispatch:
    inputs:
      server_name:
        description: "Server name to reboot (e.g. mailservice-nixos, mailservice-smoke)"
        required: true
      mode:
        description: "Action: reset, rescue, power-cycle, rebuild (reinstall from image)"
        required: true
        default: "reset"
      image:
        description: "Hetzner image/snapshot ID for rebuild mode"
        required: false
        default: "364897432"

permissions:
  contents: read

jobs:
  reboot:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: bash -euo pipefail {0}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Install hcloud CLI
        run: |
          curl -L https://github.com/hetznercloud/cli/releases/latest/download/hcloud-linux-amd64.tar.gz | tar -xz
          sudo install hcloud /usr/local/bin/hcloud

      - name: Start ssh-agent
        uses: webfactory/ssh-agent@dc588b651fe13675774614f8e6a936a468676387 # v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

      - name: Find server
        id: server
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_API }}
        run: |
          server_id=$(hcloud server list -o noheader -o columns=id,name | grep "${{ github.event.inputs.server_name }}" | awk '{print $1}')
          if [ -z "$server_id" ]; then
            echo "Server '${{ github.event.inputs.server_name }}' not found"
            hcloud server list
            exit 1
          fi
          server_ip=$(hcloud server ip "$server_id")
          echo "id=$server_id" >> "$GITHUB_OUTPUT"
          echo "ip=$server_ip" >> "$GITHUB_OUTPUT"
          echo "Found server ${{ github.event.inputs.server_name }}: ID=$server_id IP=$server_ip"

      - name: Execute action
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_API }}
          SERVER_ID: ${{ steps.server.outputs.id }}
          SERVER_IP: ${{ steps.server.outputs.ip }}
          MODE: ${{ github.event.inputs.mode }}
        run: |
          case "$MODE" in
            reset)
              echo "Hard resetting server $SERVER_ID..."
              hcloud server reset "$SERVER_ID"
              echo "Waiting 60s..."
              sleep 60
              ;;
            rescue)
              echo "Enabling rescue mode on server $SERVER_ID..."
              ssh_key_id=$(hcloud ssh-key list -o noheader -o columns=id,fingerprint | grep "${{ secrets.HETZNER_SSH_KEY_FINGERPRINT }}" | awk '{print $1}')
              if [ -z "$ssh_key_id" ]; then
                echo "SSH key not found by fingerprint, listing all keys:"
                hcloud ssh-key list
                echo "Trying first available key..."
                ssh_key_id=$(hcloud ssh-key list -o noheader -o columns=id | head -1)
              fi
              hcloud server enable-rescue "$SERVER_ID" --ssh-key "$ssh_key_id" --type linux64
              echo "Resetting server to boot into rescue..."
              hcloud server reset "$SERVER_ID"
              echo "Waiting 60s for rescue boot..."
              sleep 60
              ;;
            power-cycle)
              echo "Powering off server $SERVER_ID..."
              hcloud server poweroff "$SERVER_ID"
              echo "Waiting 15s..."
              sleep 15
              echo "Powering on server $SERVER_ID..."
              hcloud server poweron "$SERVER_ID"
              echo "Waiting 60s..."
              sleep 60
              ;;
            rebuild)
              echo "Rebuilding server $SERVER_ID from image ${{ github.event.inputs.image }}..."
              hcloud server rebuild "$SERVER_ID" --image "${{ github.event.inputs.image }}"
              echo "Rebuild initiated. Waiting 90s..."
              sleep 90
              ;;
            *)
              echo "Unknown mode: $MODE"
              exit 1
              ;;
          esac

      - name: Check SSH connectivity
        env:
          SERVER_IP: ${{ steps.server.outputs.ip }}
        run: |
          echo "Checking SSH connectivity to $SERVER_IP..."
          for i in $(seq 1 12); do
            if nc -z -w 3 "$SERVER_IP" 22 2>/dev/null; then
              echo "SSH is up on $SERVER_IP"
              exit 0
            fi
            echo "Attempt $i/12: SSH not ready, waiting 10s..."
            sleep 10
          done
          echo "WARNING: SSH still not reachable on $SERVER_IP after 2 minutes"
          exit 1

      - name: Rescue - mount and fix NixOS
        if: github.event.inputs.mode == 'rescue' && success()
        env:
          SERVER_IP: ${{ steps.server.outputs.ip }}
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_API }}
          SERVER_ID: ${{ steps.server.outputs.id }}
        run: |
          install -d -m 700 ~/.ssh
          ssh-keyscan -t ed25519 "$SERVER_IP" >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh-keyscan -t rsa "$SERVER_IP" >> ~/.ssh/known_hosts 2>/dev/null || true

          echo "Mounting filesystem in rescue mode..."
          ssh -o StrictHostKeyChecking=no "root@$SERVER_IP" '
            set -eu
            mount /dev/sda1 /mnt
            mount /dev/disk/by-label/EFI /mnt/boot/efi 2>/dev/null || true

            echo "=== Current NixOS system link ==="
            ls -la /mnt/nix/var/nix/profiles/system

            echo ""
            echo "=== Available system profiles ==="
            ls -la /mnt/nix/var/nix/profiles/ | grep system

            echo ""
            echo "=== Finding last good production generation ==="
            # Find the last generation that contains the correct hostname (not smoke)
            server_name="${{ github.event.inputs.server_name }}"
            good_gen=""
            for gen in $(ls -d /mnt/nix/var/nix/profiles/system-*-link 2>/dev/null | sort -rV); do
              target=$(readlink "$gen")
              gen_name=$(basename "$target")
              echo "  $gen -> $gen_name"
              # Skip generations with wrong hostname (e.g. smoke config on production)
              if echo "$gen_name" | grep -q "nixos-system-smoke" && echo "$server_name" | grep -qv "smoke"; then
                echo "    SKIP: smoke config on non-smoke server"
                continue
              fi
              if echo "$gen_name" | grep -q "nixos-system-truevipaccess" && echo "$server_name" | grep -q "smoke"; then
                echo "    SKIP: production config on smoke server"
                continue
              fi
              good_gen="$gen"
              break
            done
            if [ -n "$good_gen" ]; then
              echo "Rolling back to: $good_gen"
              ln -sfn "$(readlink "$good_gen")" /mnt/nix/var/nix/profiles/system
              echo "Rollback complete"
            else
              echo "No suitable generation found!"
            fi

            echo ""
            echo "=== Checking SSH config ==="
            grep -r "Port\|ListenAddress" /mnt/etc/ssh/ 2>/dev/null || echo "Default SSH config"

            echo ""
            echo "=== Checking firewall ==="
            cat /mnt/etc/nixos-firewall-rules 2>/dev/null || echo "No explicit firewall rules file"

            umount /mnt/boot/efi 2>/dev/null || true
            umount /mnt
          '

          echo "Disabling rescue mode and rebooting normally..."
          hcloud server disable-rescue "$SERVER_ID"
          hcloud server reset "$SERVER_ID"
          echo "Waiting 60s for normal boot..."
          sleep 60

          echo "Checking SSH after normal boot..."
          for i in $(seq 1 12); do
            if nc -z -w 3 "$SERVER_IP" 22 2>/dev/null; then
              echo "SSH is up on $SERVER_IP after rollback!"
              exit 0
            fi
            echo "Attempt $i/12: waiting 10s..."
            sleep 10
          done
          echo "SSH still not up after rollback"
          exit 1
