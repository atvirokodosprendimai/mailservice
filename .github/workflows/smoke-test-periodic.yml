name: Periodic Smoke Test

on:
  workflow_call:
    inputs:
      auto_pay:
        type: string
        required: false
        default: "true"
  workflow_dispatch:
    inputs:
      auto_pay:
        description: "Enable auto-pay mode (sandbox only)"
        required: false
        default: "false"

permissions:
  contents: read

jobs:
  healthz-production:
    runs-on: ubuntu-latest
    environment:
      name: production
    timeout-minutes: 1
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Production health check
        run: |
          status=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "${BASE_URL}/healthz")
          if [ "$status" != "200" ]; then
            echo "FAIL: production healthz returned HTTP $status" >&2
            exit 1
          fi
          echo "OK: production healthz returned 200"
        env:
          BASE_URL: ${{ vars.PUBLIC_BASE_URL }}

  smoke-sandbox:
    if: inputs.auto_pay == 'true' || github.event.inputs.auto_pay == 'true' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    environment:
      name: smoke
    timeout-minutes: 6
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"

      - name: Install Playwright
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Run smoke test (auto-pay)
        run: ops/smoke-test-periodic.sh --verbose --auto-pay
        env:
          SMOKE_BASE_URL: ${{ vars.PUBLIC_BASE_URL }}
          SMOKE_BILLING_EMAIL: ${{ vars.SMOKE_BILLING_EMAIL }}
          SMOKE_IMAP_HOST: ${{ vars.IMAP_HOST }}
          SMOKE_IMAP_PORT: "993"
          SMOKE_POLAR_TOKEN: ${{ secrets.POLAR_TOKEN }}
          SMOKE_POLAR_API: ${{ vars.POLAR_SERVER_URL }}
          SMOKE_ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
          SMOKE_DISCOUNT_CODE: ${{ vars.POLAR_GIFT_COUPON_CODE }}
